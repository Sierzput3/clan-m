<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Game Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #game {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
        }
        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player {
            background-color: #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
        }
        #position {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="position">Player Position: (0, 0)</div>
    <script>
        const game = document.getElementById('game');
        const positionDisplay = document.getElementById('position');
        let playerPosition = { x: 0, y: 0 };

        // Create grid
        for (let i = 0; i < 100; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            game.appendChild(cell);
        }

        function updatePlayerPosition() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.innerHTML = ''); // Clear previous player
            const playerCell = cells[playerPosition.y * 10 + playerPosition.x];
            const player = document.createElement('div');
            player.classList.add('player');
            playerCell.appendChild(player);
            positionDisplay.innerHTML = `Player Position: (${playerPosition.x}, ${playerPosition.y})`;
        }

        function movePlayer(dx, dy) {
            playerPosition.x = Math.min(9, Math.max(0, playerPosition.x + dx));
            playerPosition.y = Math.min(9, Math.max(0, playerPosition.y + dy));
            updatePlayerPosition();
        }

        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                    movePlayer(1, 0);
                    break;
            }
        });

        updatePlayerPosition();
    </script>
</body>
</html>
